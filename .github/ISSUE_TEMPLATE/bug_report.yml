name: Bug Report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `palladium install ...`
        2. ...
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `cat VERSION`
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
