name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bash
        run: sudo apt-get update && sudo apt-get install -y bash
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Phase 1 - Structural tests
        run: python tests/test_syntax.py
      - name: Phase 2 - Unit tests
        run: bash tests/unit_test.sh
      - name: Phase 3 - File integrity
        run: bash tests/run.sh
