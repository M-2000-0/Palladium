# desc: Web server / reverse proxy

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${PORT}:80"
    volumes:
      - ./data/html:/usr/share/nginx/html
      - ./data/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: palladium
