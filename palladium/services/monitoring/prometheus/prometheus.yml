global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'palladium'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  - job_name: 'palladium-services'
    static_configs:
      - targets: []
        labels:
          job: 'palladium-services'
    # Dynamically discovered via file_sd or docker_sd
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        action: keep
        regex: 'palladium.*'
      - source_labels: [__meta_docker_container_name]
        target_label: service
        regex: '/(.*)'
        replacement: '${1}'

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']